<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sivil Mahalle Ağı | Özel Durak</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 60vh; width: 100%; border-bottom: 2px solid #ddd; }
        .ui { height: 40vh; background: white; padding: 15px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
        .status { font-size: 0.8rem; font-weight: bold; text-align: center; padding: 6px; border-radius: 5px; background: #fff3cd; color: #856404; }
        .status.ok { background: #d4edda; color: #155724; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; width: 100%; box-sizing: border-box; }
        button { background: var(--s); color: white; border: none; font-weight: bold; cursor: pointer; }
        #log { font-size: 0.7rem; color: #7f8c8d; height: 45px; overflow-y: auto; background: #fdfdfd; padding: 5px; border: 1px solid #eee; border-radius: 4px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui">
    <div id="stat" class="status">📡 KENDİ DURAĞINA BAĞLANILIYOR...</div>
    <div id="log">Sistem hazır. Önce haritaya tıklayın.</div>
    <input type="password" id="pass" placeholder="🔑 Ortak Hane Şifresi" onchange="localStorage.setItem('f_key', this.value)">
    <input type="text" id="note" placeholder="Notunuz...">
    <button onclick="send()">📍 DURUMU YAYINLA</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const logger = (m) => { const e = document.getElementById('log'); e.innerText += "\n> " + m; e.scrollTop = e.scrollHeight; };
    const myId = localStorage.getItem('s_id') || 'u' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('s_id', myId);
    document.getElementById('pass').value = localStorage.getItem('f_key') || '';

    let pos = null;
    const markers = {};

    const map = L.map('map').setView([39.9, 32.8], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click', e => {
        pos = e.latlng;
        L.popup().setLatLng(e.latlng).setContent("📍 Seçildi").openOn(map);
        logger("Konum seçildi.");
    });

    // KENDİ BİLGİSAYARINDAKİ NODE.JS DURAĞINA BAĞLANIR
    const gun = Gun({
        peers: ['http://192.168.1.100:8080/gun']
    });

    const channel = gun.get('sivil_ozel_durak_v8');

    gun.on('hi', () => {
        const s = document.getElementById('stat');
        s.innerText = "✅ KENDİ DURAĞINA BAĞLI";
        s.className = "status ok";
        logger("Yerel durakla el sıkışıldı.");
    });

    channel.map().on((data, id) => {
        if(!data || !data.lat) return;
        const pk = document.getElementById('pass').value;
        const fam = (pk && data.pass === pk && pk !== "");
        const info = `<b>${data.msg || 'Sinyal'}</b><br><small>${new Date(data.t).toLocaleTimeString()}</small>`;

        if(markers[id]) {
            markers[id].setLatLng([data.lat, data.lng]).setPopupContent(info);
        } else {
            markers[id] = L.circleMarker([data.lat, data.lng], {
                radius: fam ? 12 : 8, fillColor: fam ? '#f1c40f' : '#3498db',
                fillOpacity: 0.8, color: '#000', weight: 2
            }).addTo(map).bindPopup(info);
            logger("Ağda yeni veri belirdi.");
        }
    });

    function send() {
        if(!pos) { alert("Haritaya tıkla!"); return; }
        const p = { lat: pos.lat, lng: pos.lng, pass: document.getElementById('pass').value, msg: document.getElementById('note').value, t: Date.now() };
        channel.get(myId).put(p, (ack) => {
            if(ack.err) logger("Hata: " + ack.err);
            else { alert("Yayınlandı!"); logger("Veri iletildi."); }
        });
    }
</script>
</body>
</html>
