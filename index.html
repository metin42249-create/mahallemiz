<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sivil Mahalle Ağı | V2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radix.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/store.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/rse.js"></script>
    
    <style>
        :root {
            --bg: #f8f9fa;
            --panel: #ffffff;
            --primary: #2c3e50;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); overflow: hidden; }
        
        #map { height: 60vh; width: 100%; z-index: 1; }

        .control-panel {
            height: 40vh; background: var(--panel); box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; position: relative; z-index: 1000; box-sizing: border-box;
        }

        .row { display: flex; gap: 8px; align-items: center; width: 100%; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        
        .status-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; }
        .status-btn { 
            padding: 10px 14px; border-radius: 20px; border: 1px solid #ddd; 
            font-size: 0.85rem; cursor: pointer; white-space: nowrap; background: #fff; transition: 0.2s;
        }
        .status-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        button.publish-btn { 
            background: #27ae60; color: white; border: none; padding: 14px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem;
        }
        button.publish-btn:active { background: #219653; transform: scale(0.98); }

        .info-bar { 
            position: absolute; top: 10px; left: 10px; z-index: 1001; 
            background: rgba(255,255,255,0.95); padding: 6px 15px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: #d35400; border: 1px solid #e67e22;
        }
        .info-bar.connected { color: #27ae60; border-color: #2ecc71; }

        .family-tag { background: #f1c40f; color: #000; padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="info-bar" id="netStatus">📡 Ağa Bağlanıyor...</div>
<div id="map"></div>

<div class="control-panel">
    <div class="row">
        <input type="password" id="familyKey" placeholder="🔑 Hane Şifresi (Ailenizle ortak kelime)" onchange="localStorage.setItem('f_key', this.value)">
    </div>

    <div class="status-container" id="statusList">
        <div class="status-btn active" onclick="selectStatus('😊 İyiyim', '#2ecc71', this)">😊 İyiyim</div>
        <div class="status-btn" onclick="selectStatus('🤒 Ziyaret', '#3498db', this)">🤒 Ziyaret</div>
        <div class="status-btn" onclick="selectStatus('🆘 Acil', '#e74c3c', this)">🆘 Acil</div>
        <div class="status-btn" onclick="selectStatus('🛠️ Destek', '#f39c12', this)">🛠️ Destek</div>
    </div>

    <div class="row">
        <input type="text" id="userNote" placeholder="Kısa bir not yazın...">
    </div>

    <button class="publish-btn" onclick="handlePublish()">📍 DURUM YAYINLA</button>
    <small style="text-align: center; font-size: 0.75rem; color: #7f8c8d;">Önce haritaya tıklayıp konumunuzu seçin.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. KİMLİK OLUŞTURMA ---
    let myId = localStorage.getItem('s_id');
    if (!myId) {
        myId = 's_' + Math.random().toString(36).substr(2, 10);
        localStorage.setItem('s_id', myId);
    }
    document.getElementById('familyKey').value = localStorage.getItem('f_key') || '';

    let currentStatus = '😊 İyiyim';
    let currentColor = '#2ecc71';
    let manualCoord = null;
    let tempMarker = null;

    // --- 2. HARİTA AYARLARI ---
    const map = L.map('map').setView([39.93, 32.85], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // --- 3. MERKEZİYETSİZ AĞ BAĞLANTISI (P2P) ---
    const gun = Gun({
        peers: [
            'https://gun-manhattan.herokuapp.com/gun',
            'https://relay.peer.ooo/gun'
        ],
        localStorage: true // Veriyi tarayıcıda yedekle
    });
    
    // Veritabanı Kanalı (İsmi değiştirmeyin, iki cihaz aynı kanalda olmalı)
    const db = gun.get('sivil_mahalle_kanal_v3');
    const markers = {};

    gun.on('hi', () => {
        const statusEl = document.getElementById('netStatus');
        statusEl.innerText = "⚡ Sivil Ağa Bağlı";
        statusEl.classList.add('connected');
    });

    // --- 4. HARİTAYA TIKLAMA ---
    map.on('click', (e) => {
        manualCoord = e.latlng;
        if (tempMarker) map.removeLayer(tempMarker);
        
        tempMarker = L.marker(manualCoord).addTo(map)
            .bindPopup("📍 Hedef konum seçildi. Şimdi 'Yayınla' butonuna basın.")
            .openPopup();
    });

    // --- 5. AĞI DİNLE VE PİNLERİ YERLEŞTİR ---
    db.map().on((data, id) => {
        if (!data || !data.lat) return;

        const myFKey = localStorage.getItem('f_key');
        const isFamily = (myFKey && data.fKey === myFKey && myFKey !== "");

        const popupContent = `
            ${isFamily ? '<span class="family-tag">🏠 AİLE ÜYESİ</span><br>' : ''}
            <strong style="font-size:1.1rem; color:${data.color}">${data.status}</strong><br>
            <div style="margin-top:5px; margin-bottom:5px;">${data.note || ''}</div>
            <small style="color:#888">${new Date(data.time).toLocaleTimeString()}</small>
        `;

        if (markers[id]) {
            markers[id].setLatLng([data.lat, data.lng]).setPopupContent(popupContent);
            updateMarkerStyle(markers[id], data, isFamily);
        } else {
            const m = L.circleMarker([data.lat, data.lng]).addTo(map).bindPopup(popupContent);
            updateMarkerStyle(m, data, isFamily);
            markers[id] = m;
        }
    });

    function updateMarkerStyle(m, data, isFamily) {
        m.setStyle({
            radius: isFamily ? 14 : 9,
            fillColor: isFamily ? '#f1c40f' : data.color,
            color: '#000',
            weight: isFamily ? 3 : 2,
            fillOpacity: 0.9
        });
        if(isFamily) m.bringToFront();
    }

    // --- 6. BUTON İŞLEMLERİ ---
    function selectStatus(label, color, el) {
        currentStatus = label;
        currentColor = color;
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function handlePublish() {
        if (!manualCoord) {
            alert("Lütfen önce harita üzerinde bir noktaya tıklayarak konumunuzu seçin!");
            return;
        }

        const fKey = document.getElementById('familyKey').value;
        const note = document.getElementById('userNote').value;

        // Veriyi P2P ağa yaz
        db.get(myId).put({
            lat: manualCoord.lat,
            lng: manualCoord.lng,
            status: currentStatus,
            color: currentColor,
            fKey: fKey,
            note: note,
            time: Date.now()
        }, (ack) => {
            if(ack.err) {
                alert("Yayınlanırken hata oluştu. İnternet bağlantınızı kontrol edin.");
            } else {
                if (tempMarker) { map.removeLayer(tempMarker); manualCoord = null; }
                document.getElementById('userNote').value = "";
                alert("Sivil ağa gönderildi! Diğer cihazların görmesi birkaç saniye sürebilir.");
            }
        });
    }
</script>

</body>
</html>
