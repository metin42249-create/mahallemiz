<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sivil Mahalle Ağı</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); overflow: hidden; }
        
        #map { height: 60vh; width: 100%; z-index: 1; border-bottom: 2px solid #ddd; }

        .control-panel {
            height: 40vh; background: white; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            box-sizing: border-box; box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
            position: relative; z-index: 1000;
        }

        .status-header {
            font-size: 0.8rem; font-weight: bold; text-align: center;
            padding: 6px; border-radius: 5px; background: #fff3cd; color: #856404;
        }
        .status-header.online { background: #d4edda; color: #155724; }

        input {
            padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; width: 100%; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }

        button {
            background: var(--success); color: white; border: none;
            padding: 15px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }

        #log {
            font-size: 0.7rem; color: #7f8c8d; height: 45px;
            overflow-y: auto; background: #fdfdfd; padding: 5px;
            border: 1px solid #eee; border-radius: 4px; white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <div id="netStatus" class="status-header">📡 AĞ ARANIYOR...</div>
    
    <div id="log">Sistem hazır. Önce haritaya tıklayın.</div>

    <input type="password" id="familyKey" placeholder="🔑 Ortak Hane Şifresi" onchange="localStorage.setItem('f_key', this.value)">
    <input type="text" id="userNote" placeholder="Notunuzu yazın (İyiyim, yardıma hazırım vb.)">
    
    <button onclick="handlePublish()">📍 DURUMU YAYINLA</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const logger = (m) => { const el = document.getElementById('log'); el.innerText += "\n> " + m; el.scrollTop = el.scrollHeight; };
    
    // Kimlik ve Şifre Hatırlatıcı
    const myId = localStorage.getItem('s_id') || 'u' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('s_id', myId);
    document.getElementById('familyKey').value = localStorage.getItem('f_key') || '';

    let selectedLatLng = null;
    const markers = {};

    // 1. Harita Kurulumu
    const map = L.map('map').setView([39.9, 32.8], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click', e => {
        selectedLatLng = e.latlng;
        L.popup().setLatLng(e.latlng).setContent("📍 Konum İşaretlendi").openOn(map);
        logger("Konum seçildi.");
    });

    // 2. Merkezi Olmayan Ortak Durak (Meydan)
    // Tüm sivil kullanıcılar bu durak üzerinden el sıkışır.
    const gun = Gun(['https://gunjs.herokuapp.com/gun']);
    const channel = gun.get('sivil_ortak_meydan_final');

    gun.on('hi', () => {
        const statusEl = document.getElementById('netStatus');
        statusEl.innerText = "✅ SİVİL AĞA BAĞLANILDI";
        statusEl.className = "status-header online";
        logger("Ağa başarıyla giriş yapıldı.");
    });

    // 3. Veri Dinleme
    channel.map().on((data, id) => {
        if(!data || !data.lat) return;
        
        const fKey = document.getElementById('familyKey').value;
        const isFamily = (fKey && data.pass === fKey && fKey !== "");

        const content = `<b>${data.msg || 'Sinyal'}</b><br><small>${new Date(data.t).toLocaleTimeString()}</small>`;

        if(markers[id]) {
            markers[id].setLatLng([data.lat, data.lng]).setPopupContent(content);
        } else {
            markers[id] = L.circleMarker([data.lat, data.lng], {
                radius: isFamily ? 12 : 8,
                fillColor: isFamily ? '#f1c40f' : '#3498db',
                fillOpacity: 0.8, color: '#000', weight: 2
            }).addTo(map).bindPopup(content);
            logger("Ağda yeni bir kullanıcı belirdi.");
        }
    });

    // 4. Yayınlama
    function handlePublish() {
        if(!selectedLatLng) {
            alert("Lütfen önce haritaya tıklayıp konumunuzu seçin!");
            return;
        }

        const payload = {
            lat: selectedLatLng.lat,
            lng: selectedLatLng.lng,
            pass: document.getElementById('familyKey').value,
            msg: document.getElementById('userNote').value,
            t: Date.now()
        };

        logger("Veri gönderiliyor...");
        channel.get(myId).put(payload, (ack) => {
            if(ack.err) {
                logger("Gönderim Hatası: " + ack.err);
            } else {
                alert("Durumunuz başarıyla yayınlandı!");
                logger("Durum ağa iletildi.");
            }
        });
    }
</script>
</body>
</html>
