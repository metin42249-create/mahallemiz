<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sivil Mahalle V6 | Klasik Görünüm</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        :root { --main-bg: #f8f9fa; --panel-bg: #ffffff; --accent: #2980b9; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--main-bg); overflow: hidden; }
        
        #map { height: 60vh; width: 100%; z-index: 1; }
        
        .ui-panel { 
            height: 40vh; background: var(--panel-bg); padding: 15px; 
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1); position: relative; z-index: 1000;
        }

        .status-bar { 
            font-size: 0.75rem; text-align: center; padding: 5px; 
            background: #fff3cd; color: #856404; font-weight: bold; border-radius: 5px;
        }
        .status-bar.online { background: #d4edda; color: #155724; }

        input { 
            padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 1rem; width: 100%; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent); }

        button { 
            background: #27ae60; color: white; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        button:active { transform: scale(0.98); }

        #log { 
            font-size: 0.65rem; color: #7f8c8d; height: 50px; 
            overflow-y: auto; background: #fdfdfd; padding: 5px; 
            border: 1px solid #eee; border-radius: 4px; white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div id="status" class="status-bar">📡 AĞ ARANIYOR...</div>
    <div id="log">Sistem başlatıldı. Lütfen haritaya tıklayın.</div>
    
    <input type="password" id="pass" placeholder="Anahtar Kelime (Ailenizle aynı yapın)" onchange="localStorage.setItem('f_key', this.value)">
    <input type="text" id="msg" placeholder="Mesajınız...">
    
    <button onclick="publish()">📍 DURUMU YAYINLA</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const logger = (m) => { const el = document.getElementById('log'); el.innerText += "\n> " + m; el.scrollTop = el.scrollHeight; };
    const myId = localStorage.getItem('s_id') || 'u' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('s_id', myId);
    document.getElementById('pass').value = localStorage.getItem('f_key') || '';

    let selectedCoord = null;
    const markers = {};

    // 1. Haritayı Başlat
    const map = L.map('map').setView([39.9, 32.8], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click', e => {
        selectedCoord = e.latlng;
        L.popup().setLatLng(e.latlng).setContent("📍 Konum İşaretlendi").openOn(map);
        logger("Konum seçildi.");
    });

    // 2. Yeni Sivil Relay Bağlantısı
    const gun = Gun(['https://p2p.twit.ge/gun']);
    const channel = gun.get('sivil_mahalle_v6_final');

    gun.on('hi', () => {
        const s = document.getElementById('status');
        s.innerText = "✅ SİVİL AĞA BAĞLI";
        s.className = "status-bar online";
        logger("Buluşma noktasına erişildi.");
    });

    // 3. Veri Dinleme
    channel.map().on((data, id) => {
        if(!data || !data.lat) return;
        
        const myPass = document.getElementById('pass').value;
        const isFamily = (myPass && data.pass === myPass && myPass !== "");

        const content = `<b>${data.msg || 'Sinyal'}</b><br><small>${new Date(data.t).toLocaleTimeString()}</small>`;

        if(markers[id]) {
            markers[id].setLatLng([data.lat, data.lng]).setPopupContent(content);
        } else {
            markers[id] = L.circleMarker([data.lat, data.lng], {
                radius: isFamily ? 12 : 8,
                fillColor: isFamily ? '#f1c40f' : '#3498db',
                fillOpacity: 0.8, color: '#000', weight: 2
            }).addTo(map).bindPopup(content);
            logger("Yeni bir kullanıcı görüldü!");
        }
    });

    // 4. Yayınlama
    function publish() {
        if(!selectedCoord) {
            alert("Lütfen önce haritaya tıklayıp konumunuzu seçin!");
            return;
        }

        const payload = {
            lat: selectedCoord.lat,
            lng: selectedCoord.lng,
            pass: document.getElementById('pass').value,
            msg: document.getElementById('msg').value,
            t: Date.now()
        };

        logger("Gönderiliyor...");
        channel.get(myId).put(payload, (ack) => {
            if(ack.err) logger("Hata: " + ack.err);
            else {
                alert("Durumunuz Başarıyla Yayınlandı!");
                logger("Veri ağa fırlatıldı.");
            }
        });
    }
</script>
</body>
</html>
